<div class="profile-edit-container" *ngIf="!loading; else loadingTpl">
  <h2>Edit Profile</h2>

  <form [formGroup]="form" (ngSubmit)="saveChanges()">
    <div class="form-group">
      <label>Display Name</label>
      <input type="text" formControlName="displayName" class="form-control" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email" class="form-control" />
    </div>

    <div class="form-group">
      <label>Bio</label>
      <textarea formControlName="bio" class="form-control" rows="4"></textarea>
    </div>

    <div class="buttons">
      <button type="submit" class="btn btn-primary" [disabled]="loading">Save Changes</button>
      <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
    </div>
  </form>
</div>

<ng-template #loadingTpl>
  <p>Loading...</p>
</ng-template>
